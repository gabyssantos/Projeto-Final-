<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ocorrências</title>
  <link rel="stylesheet" href="selecaodaocorrencia.css">

  <!-- Ícones -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <span class="material-icons">home</span>

    <div class="logo">
      <img src="img.png" alt="Logo">
      <span>RECLAMA MEU MUNICÍPIO</span>
    </div>

    <span class="material-icons">person</span>
  </div>

  <!-- TÍTULO -->
  <h2>Selecione sua ocorrência</h2>

  <!-- GRID -->
  <div class="grid">

    <div class="card">
      <div class="circle">🏙️</div>
      <p>Limpeza da Cidade</p>
    </div>

    <div class="card">
      <div class="circle">🏥</div>
      <p>Posto de Saúde</p>
    </div>

    <div class="card">
      <div class="circle">🛣️</div>
      <p>Ruas Asfaltadas</p>
    </div>

    <div class="card">
      <div class="circle">💡</div>
      <p>Iluminação Pública</p>
    </div>

    <div class="card">
      <div class="circle">🗑️</div>
      <p>Coleta de Lixo</p>
    </div>

    <div class="card">
      <div class="circle">🌳</div>
      <p>Áreas de Lazer</p>
    </div>

    <div class="card">
      <div class="circle">🚌</div>
      <p>Horários de Ônibus</p>
    </div>

    <div class="card">
      <div class="circle">💻</div>
      <p>Serviços Digitais</p>
    </div>

  </div>

</div>

</body>
</html>
