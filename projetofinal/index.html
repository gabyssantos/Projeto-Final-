<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reclama Mairinque</title>
    <link rel="stylesheet" href="/style.css">

    <style>
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
          font-family: Arial, sans-serif;
        }

        body {
          background: #f4f4f4;
        }

        /* HEADER */
        header {
          background: #2f4ea2;
          padding: 10px;
          display: flex;
          align-items: center;
          justify-content: space-between;
          color: white;
        }

        header img {
          height: 40px;
        }

        .logo-title {
          display: flex;
          align-items: center;
          gap: 10px;
        }

        /* HERO SECTION */
        .hero {
          position: relative;
          height: 90vh;
          background: url('https://images.unsplash.com/photo-1564013799919-ab600027ffc6') center/cover no-repeat;
          display: flex;
          align-items: center;
          justify-content: center;
          text-align: center;
        }

        .overlay {
          position: absolute;
          width: 100%;
          height: 100%;
          background: rgba(255,255,255,0.6);
          top: 0;
          left: 0;
        }

        .content {
          position: relative;
          z-index: 2;
          padding: 20px;
        }

        .content h1 {
          font-size: 28px;
          color: #000;
          margin-bottom: 30px;
          line-height: 1.4;
        }

        /* BUTTONS */
        .btn {
          display: inline-block;
          padding: 15px 25px;
          background: #f5c400;
          color: #000;
          font-weight: bold;
          border-radius: 8px;
          text-decoration: none;
          margin-bottom: 15px;
          transition: 0.3s;
        }

        .btn:hover {
          background: #e0b000;
        }

        .link {
          display: block;
          color: #000;
          font-size: 14px;
          text-decoration: underline;
        }

        /* MOBILE */
        @media (max-width: 600px) {
          .content h1 {
            font-size: 22px;
          }

          .btn {
            width: 100%;
          }
        }
    </style>
</head>

<body>

<header>
    <div class="logo-title">
        <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" alt="WhatsApp">
    </div>

    <img src="https://chatgpt.com/s/m_69b9510ae43c819184f9518b5af7c6e0" alt="Logo">
</header>

<section class="hero">
    <div class="overlay"></div>

    <div class="content">
        <h1>Bem - Vindo ao<br>Reclama Mairinque!</h1>

        <a href="#" class="btn">Faça sua reclamação</a>
        <a href="#" class="link">Denúncia anônima</a>
    </div>
</section>

</body>
</html>
