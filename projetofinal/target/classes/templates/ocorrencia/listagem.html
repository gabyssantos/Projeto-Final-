<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listagem - Escola</title>
    <link rel="stylesheet" href="/style2.css">
</head>
<body>

<!-- Menu -->
<div th:replace="~{/fragments/menu.html :: menu}"></div>

<main>

    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px;">
        <h2>Listagem de Alunos</h2>
        <a th:href="@{/aluno/cadastro}" class="btn btn-success">Cadastrar Novo</a>
    </div>

    <div class="table-container">
        <table>
            <thead>
            <tr>
                <th>Foto</th>
                <th>Nome</th>
                <th>Email</th>
                <th>CPF</th>
                <th>Ações</th>
            </tr>
            </thead>

            <tbody>

            <!-- Caso não tenha registros -->
            <tr th:if="${alunos.empty}">
                <td colspan="5" style="text-align: center;">
                    Nenhum registro encontrado.
                </td>
            </tr>

            <!-- Lista de alunos -->
            <tr th:each="p : ${alunos}">

                <!-- FOTO -->
                <td>
                    <img th:if="${p.foto != null}"
                         th:src="@{'/foto_pessoa/' + ${p.foto}}"
                         class="foto-tabela">

                    <img th:if="${p.foto == null}"
                         src="/foto_pessoa/default.png"
                         class="foto-tabela">
                </td>

                <td th:text="${p.nome}"></td>
                <td th:text="${p.email}"></td>
                <td th:text="${p.cpf}"></td>

                <td style="white-space: nowrap;">
                    <a th:href="@{'/aluno/excluir/' + ${p.id}}"
                       class="btn btn-cancel"
                       onclick="return confirm('Deseja realmente excluir este registro?');"
                       style="margin-right: 8px;">
                        Excluir
                    </a>

                    <a th:href="@{'/aluno/alterar/' + ${p.id}}"
                       class="btn btn-alter">
                        Alterar
                    </a>
                </td>

            </tr>

            </tbody>
        </table>
    </div>

</main>

<!-- Footer -->
<div th:replace="~{/fragments/footer.html :: footer}"></div>

</body>
</html>
